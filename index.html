<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>OneGrasp Webinar — International Scientific Conferences: Importance & Awareness</title>
    <meta name="title" content="OneGrasp Webinar — International Scientific Conferences" />
    <meta name="description" content="Join our 2-hour online webinar on 23 July 2026 to learn everything about international scientific conferences, DOI submission, CPD credits, keynote speaking, and research visibility. Only ₹299." />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://onegrasp.com/wp-content/uploads/2026/05/logo.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="OneGrasp Webinar — International Scientific Conferences" />
    <meta property="og:description" content="2-hour online webinar | 23 July 2026 | ₹299 | Learn about DOI, CPD credits, conference publishing & more." />
    <meta property="og:image" content="https://onegrasp.com/wp-content/uploads/2026/05/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OneGrasp Webinar — International Scientific Conferences" />
    <meta name="twitter:description" content="2-hour online webinar | 23 July 2026 | ₹299 | Learn about DOI, CPD credits, conference publishing & more." />
    <meta name="twitter:image" content="https://onegrasp.com/wp-content/uploads/2026/05/logo.png" />

    <!-- DNS Prefetch & Preconnect for third-party origins -->
    <link rel="preconnect" href="https://checkout.razorpay.com" crossorigin />
    <link rel="dns-prefetch" href="https://checkout.razorpay.com" />
    <link rel="preconnect" href="https://images.pexels.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.pexels.com" />
    <link rel="preconnect" href="https://onegrasp.com" crossorigin />
    <link rel="dns-prefetch" href="https://onegrasp.com" />

    <!-- Google Fonts preconnect (for Inter font used site-wide) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter font — loaded via link (not @import) for non-blocking load -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    />

    <!-- Preload LCP image (hero poster) with responsive srcset -->
    <!-- Browser picks the right size immediately, before JS runs -->
    <link
      rel="preload"
      as="image"
      href="/images/hero%20poster-1040w.webp"
      imagesrcset="/images/hero%20poster-480w.webp 480w, /images/hero%20poster-768w.webp 768w, /images/hero%20poster-1040w.webp 1040w"
      imagesizes="(max-width: 640px) 480px, (max-width: 1024px) 768px, 1040px"
      type="image/webp"
      fetchpriority="high"
    />
  </head>
  <body>
    <div id="root"></div>

    <!-- Razorpay checkout — deferred so it doesn't block HTML parsing -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" defer></script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
